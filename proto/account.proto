syntax = "proto3";

package account;
option go_package = "./pb/account";

service AccountService {
  rpc CreateAccount(CreateAccountRequest) returns (AccountResponse) {}
  rpc GetAccountDetails(AccountIdRequest) returns (AccountResponse) {}
  rpc ListUserAccounts(UserIdRequest) returns (AccountListResponse) {}
  rpc UpdateAccountStatus(UpdateStatusRequest) returns (StatusResponse) {}
  rpc CloseAccount(AccountIdRequest) returns (StatusResponse) {}
  rpc IssueCard(IssueCardRequest) returns (CardResponse) {}
  rpc BlockCard(CardIdRequest) returns (StatusResponse) {}
  rpc GetCardDetails(CardIdRequest) returns (CardResponse) {}
  rpc SetCardLimit(SetLimitRequest) returns (StatusResponse) {}
  rpc UpdateAccountTier(UpdateTierRequest) returns (StatusResponse) {}
  rpc GetAccountLimits(AccountIdRequest) returns (LimitsResponse) {}
  rpc FreezeAccount(AccountIdRequest) returns (StatusResponse) {}
}

message AccountIdRequest { string account_id = 1; }
message UserIdRequest { string user_id = 1; }
message CardIdRequest { string card_id = 1; }
message StatusResponse { bool success = 1; string message = 2; }

message CreateAccountRequest { string user_id = 1; string currency = 2; }
message AccountResponse { string account_id = 1; string user_id = 2; double balance = 3; string status = 4; }
message AccountListResponse { repeated AccountResponse accounts = 1; }
message UpdateStatusRequest { string account_id = 1; string status = 2; }
message IssueCardRequest { string account_id = 1; string card_type = 2; }
message CardResponse { string card_id = 1; string account_id = 2; string number = 3; string status = 4; }
message SetLimitRequest { string card_id = 1; double limit = 2; }
message UpdateTierRequest { string account_id = 1; string tier = 2; }
message LimitsResponse { double daily_limit = 1; double monthly_limit = 2; }